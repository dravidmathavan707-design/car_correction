{% extends "base.html" %}
{% block content %}

<h4 class="mb-4">Staff Management</h4>

<style>
    .password-wrap {
        position: relative;
    }

    .password-wrap .form-control {
        padding-right: 44px;
    }

    .password-toggle-btn {
        position: absolute;
        top: 50%;
        right: 12px;
        transform: translateY(-50%);
        border: none;
        background: transparent;
        color: #4f46e5;
        cursor: pointer;
        padding: 0;
        line-height: 1;
    }

    .password-toggle-btn:hover {
        color: #312e81;
    }
</style>

<div class="card p-4 shadow col-md-6 mb-4">
    <form method="POST" action="/add_staff">
        <input type="text" name="username" class="form-control mb-3" placeholder="Username" required>
        <div class="password-wrap mb-3">
            <input type="password" id="staff-password" name="password" class="form-control" placeholder="Password" required>
            <button type="button" class="password-toggle-btn" id="staff-password-toggle" aria-label="Show or hide password">
                <i class="fa-solid fa-eye"></i>
            </button>
        </div>
        <button class="btn btn-primary">Add Staff</button>
    </form>
</div>

<div class="card p-4 shadow">
    <table class="table table-bordered">
        <tr>
            <th>Username</th>
            <th>Created</th>
            <th>Action</th>
        </tr>

        {% for staff in staffs %}
        <tr>
            <td>{{ staff.username }}</td>
            <td>{{ staff.created_at.strftime('%d-%m-%Y') }}</td>
            <td>
                <a href="/delete_staff/{{ staff._id }}" 
                   class="btn btn-danger btn-sm"
                   onclick="return confirm('Delete staff?')">
                   Delete
                </a>
            </td>
        </tr>
        {% endfor %}
    </table>
</div>

<script>
    const staffPasswordInput = document.getElementById("staff-password");
    const staffPasswordToggle = document.getElementById("staff-password-toggle");

    if (staffPasswordInput && staffPasswordToggle) {
        staffPasswordToggle.addEventListener("click", function () {
            const icon = this.querySelector("i");
            const isHidden = staffPasswordInput.type === "password";

            staffPasswordInput.type = isHidden ? "text" : "password";
            icon.classList.toggle("fa-eye", !isHidden);
            icon.classList.toggle("fa-eye-slash", isHidden);
        });
    }
</script>

{% endblock %}
