<!DOCTYPE html>
<html>
<head>
    <title>Car Service System</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">

    <style>
        :root {
            --bg-main: #f8fafc;
            --bg-sidebar: linear-gradient(165deg, #10233f 0%, #153d59 55%, #0f2a47 100%);
            --bg-card: #ffffff;
            --text-main: #0f172a;
            --text-sidebar: #ffffff;
            --border-color: #e2e8f0;
            --hover-color: rgba(255, 255, 255, 0.14);
            --sidebar-glow: rgba(104, 187, 255, 0.35);
        }

        body.dark-mode {
            --bg-main: #0f172a;
            --bg-sidebar: linear-gradient(165deg, #0a1220 0%, #111827 55%, #151f2f 100%);
            --bg-card: #1f2937;
            --text-main: #f1f5f9;
            --text-sidebar: #f1f5f9;
            --border-color: #374151;
            --hover-color: rgba(255, 255, 255, 0.08);
            --sidebar-glow: rgba(96, 165, 250, 0.3);
        }

        body {
            background: var(--bg-main);
            color: var(--text-main);
            transition: 0.3s ease;
        }

        @keyframes sidebarFadeIn {
            from {
                opacity: 0;
                transform: translateX(-16px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        @keyframes navItemSlide {
            from {
                opacity: 0;
                transform: translateX(-10px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        @keyframes linkGlowPulse {
            0%, 100% {
                box-shadow: 0 0 0 rgba(125, 211, 252, 0);
            }
            50% {
                box-shadow: 0 0 14px rgba(125, 211, 252, 0.35);
            }
        }

        @keyframes lightSweep {
            0% {
                transform: translateX(-130%) skewX(-20deg);
                opacity: 0;
            }
            30% {
                opacity: 0.9;
            }
            100% {
                transform: translateX(145%) skewX(-20deg);
                opacity: 0;
            }
        }

        /* Sidebar */
        .sidebar {
            height: 100vh;
            background: var(--bg-sidebar);
            color: var(--text-sidebar);
            padding: 20px 14px;
            transition: 0.3s ease;
            position: sticky;
            top: 0;
            box-shadow: 8px 0 30px rgba(0, 0, 0, 0.18);
            overflow-y: auto;
            animation: sidebarFadeIn 0.5s ease-out;
        }

        .sidebar::before {
            content: "";
            position: absolute;
            top: -40px;
            right: -30px;
            width: 140px;
            height: 140px;
            background: radial-gradient(circle, var(--sidebar-glow), transparent 70%);
            pointer-events: none;
        }

        .sidebar h4 {
            color: var(--text-sidebar);
            font-weight: 700;
            letter-spacing: 0.4px;
            margin-bottom: 26px;
        }

        .sidebar .menu-link {
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--text-sidebar);
            padding: 12px 14px;
            margin-bottom: 8px;
            text-decoration: none;
            border-radius: 12px;
            transition: 0.25s ease;
            font-weight: 600;
            position: relative;
            animation: navItemSlide 0.45s ease-out both;
            overflow: hidden;
        }

        .sidebar .menu-link::before {
            content: "";
            position: absolute;
            inset: 0;
            border-radius: 12px;
            border: 1px solid rgba(125, 211, 252, 0);
            transition: border-color 0.25s ease;
            pointer-events: none;
        }

        .sidebar .menu-link::after {
            content: "";
            position: absolute;
            top: 0;
            left: -40%;
            width: 34%;
            height: 100%;
            background: linear-gradient(90deg, transparent 0%, rgba(186, 230, 253, 0.55) 50%, transparent 100%);
            pointer-events: none;
            opacity: 0;
        }

        .sidebar .menu-link i {
            width: 18px;
            text-align: center;
            opacity: 0.95;
        }

        .sidebar .menu-link:hover {
            background: var(--hover-color);
            transform: translateX(4px);
            animation: linkGlowPulse 1.4s ease-in-out infinite;
        }

        .sidebar .menu-link:hover::before,
        .sidebar .menu-link.active::before {
            border-color: rgba(125, 211, 252, 0.65);
        }

        .sidebar .menu-link:hover::after,
        .sidebar .menu-link.active::after {
            animation: lightSweep 2s ease-in-out infinite;
        }

        .sidebar .menu-link.active {
            background: rgba(255, 255, 255, 0.2);
            box-shadow: inset 3px 0 0 #7dd3fc;
            animation: linkGlowPulse 2s ease-in-out infinite;
        }

        .sidebar .menu-link.logout-link {
            color: #fecaca;
        }

        .sidebar .menu-link.logout-link:hover {
            background: rgba(248, 113, 113, 0.16);
            color: #fee2e2;
        }

        /* Navbar */
        .navbar {
            background: var(--bg-card);
            border-bottom: 1px solid var(--border-color);
            transition: 0.3s ease;
        }

        /* Cards */
        .card {
            background: var(--bg-card);
            color: var(--text-main);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            transition: 0.3s ease;
        }

        /* Tables */
        table {
            color: var(--text-main);
        }

        thead {
            background: var(--hover-color);
            color: white;
        }

        /* Toggle Switch */
        .theme-switch {
            cursor: pointer;
            padding: 6px 12px;
            border-radius: 20px;
            border: 1px solid var(--border-color);
            background: transparent;
            color: var(--text-main);
        }

        .theme-switch:hover {
            background: var(--hover-color);
            color: white;
        }

        @media (max-width: 767px) {
            .sidebar {
                height: auto;
                position: relative;
                border-radius: 0 0 14px 14px;
            }
        }

    </style>
</head>

<body>

<div class="container-fluid">
    <div class="row">

        <!-- Sidebar -->
        <div class="col-md-2 sidebar">
            <h4 class="text-center mb-4">Car Service</h4>

            <a href="/dashboard" class="menu-link {% if request.path == '/dashboard' %}active{% endif %}">
                <i class="fa-solid fa-chart-pie"></i> Dashboard
            </a>

            {% if session.role == "admin" %}
            <a href="/staff_management" class="menu-link {% if request.path == '/staff_management' %}active{% endif %}">
                <i class="fa-solid fa-users-gear"></i> Manage Staff
            </a>
            {% endif %}

            <a href="/add_customer" class="menu-link {% if request.path == '/add_customer' %}active{% endif %}">
                <i class="fa-solid fa-user-plus"></i> Add Customer
            </a>
            <a href="/add_repair" class="menu-link {% if request.path == '/add_repair' %}active{% endif %}">
                <i class="fa-solid fa-screwdriver-wrench"></i> Add Repair
            </a>

            <hr>
            <a href="/logout" class="menu-link logout-link">
                <i class="fa-solid fa-right-from-bracket"></i> Logout
            </a>
        </div>

        <!-- Main Content -->
        <div class="col-md-10">

            <nav class="navbar p-3">
                <div class="container-fluid d-flex justify-content-between align-items-center">
                    <span>
                        Welcome, {{ session.user }} ({{ session.role }})
                    </span>

                    <button onclick="toggleTheme()" class="theme-switch">
                        🌙 / ☀
                    </button>
                </div>
            </nav>

            <div class="p-4">
                {% block content %}{% endblock %}
            </div>

        </div>

    </div>
</div>

<script>
    function toggleTheme() {
        document.body.classList.toggle("dark-mode");

        if (document.body.classList.contains("dark-mode")) {
            localStorage.setItem("theme", "dark");
        } else {
            localStorage.setItem("theme", "light");
        }
    }

    window.onload = function () {
        const savedTheme = localStorage.getItem("theme");
        if (savedTheme === "dark") {
            document.body.classList.add("dark-mode");
        }
    };
</script>

</body>
</html>
