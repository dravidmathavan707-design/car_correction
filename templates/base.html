<!DOCTYPE html>
<html>
<head>
    <title>Car Service System</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        :root {
            --bg-main: #f8fafc;
            --bg-sidebar: #1e293b;
            --bg-card: #ffffff;
            --text-main: #0f172a;
            --text-sidebar: #ffffff;
            --border-color: #e2e8f0;
            --hover-color: #334155;
        }

        body.dark-mode {
            --bg-main: #0f172a;
            --bg-sidebar: #111827;
            --bg-card: #1f2937;
            --text-main: #f1f5f9;
            --text-sidebar: #f1f5f9;
            --border-color: #374151;
            --hover-color: #1e293b;
        }

        body {
            background: var(--bg-main);
            color: var(--text-main);
            transition: 0.3s ease;
        }

        /* Sidebar */
        .sidebar {
            height: 100vh;
            background: var(--bg-sidebar);
            color: var(--text-sidebar);
            padding-top: 20px;
            transition: 0.3s ease;
        }

        .sidebar h4 {
            color: var(--text-sidebar);
        }

        .sidebar a {
            display: block;
            color: var(--text-sidebar);
            padding: 12px 20px;
            text-decoration: none;
            transition: 0.2s;
        }

        .sidebar a:hover {
            background: var(--hover-color);
        }

        /* Navbar */
        .navbar {
            background: var(--bg-card);
            border-bottom: 1px solid var(--border-color);
            transition: 0.3s ease;
        }

        /* Cards */
        .card {
            background: var(--bg-card);
            color: var(--text-main);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            transition: 0.3s ease;
        }

        /* Tables */
        table {
            color: var(--text-main);
        }

        thead {
            background: var(--hover-color);
            color: white;
        }

        /* Toggle Switch */
        .theme-switch {
            cursor: pointer;
            padding: 6px 12px;
            border-radius: 20px;
            border: 1px solid var(--border-color);
            background: transparent;
            color: var(--text-main);
        }

        .theme-switch:hover {
            background: var(--hover-color);
            color: white;
        }

    </style>
</head>

<body>

<div class="container-fluid">
    <div class="row">

        <!-- Sidebar -->
        <div class="col-md-2 sidebar">
            <h4 class="text-center mb-4">🚗 Car Service</h4>

            <a href="/dashboard">Dashboard</a>

            {% if session.role == "admin" %}
            <a href="/staff_management">Manage Staff</a>
            {% endif %}

            <a href="/add_customer">Add Customer</a>
            <a href="/add_repair">Add Repair</a>

            <hr>
            <a href="/logout" class="text-danger">Logout</a>
        </div>

        <!-- Main Content -->
        <div class="col-md-10">

            <nav class="navbar p-3">
                <div class="container-fluid d-flex justify-content-between align-items-center">
                    <span>
                        Welcome, {{ session.user }} ({{ session.role }})
                    </span>

                    <button onclick="toggleTheme()" class="theme-switch">
                        🌙 / ☀
                    </button>
                </div>
            </nav>

            <div class="p-4">
                {% block content %}{% endblock %}
            </div>

        </div>

    </div>
</div>

<script>
    function toggleTheme() {
        document.body.classList.toggle("dark-mode");

        if (document.body.classList.contains("dark-mode")) {
            localStorage.setItem("theme", "dark");
        } else {
            localStorage.setItem("theme", "light");
        }
    }

    window.onload = function () {
        const savedTheme = localStorage.getItem("theme");
        if (savedTheme === "dark") {
            document.body.classList.add("dark-mode");
        }
    };
</script>

</body>
</html>
