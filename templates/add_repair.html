{% extends "base.html" %}
{% block content %}

<div class="card p-4 shadow col-md-6">
    <h4>Add Repair</h4>

    {% if error %}
    <div class="alert alert-danger" role="alert">
        {{ error }}
    </div>
    {% endif %}

    <form method="POST" enctype="multipart/form-data">
        <input type="text" name="customer" class="form-control mb-3" placeholder="Customer Name" required>
        <input type="text" name="service" class="form-control mb-3" placeholder="Service Type" required>
        <input type="number" name="cost" class="form-control mb-3" placeholder="Cost" required>
        <input type="number" name="warranty" class="form-control mb-3" placeholder="Warranty (Months)">
        
        <label class="form-label">Damaged Part Photos (Optional)</label>
        <input type="file" name="damage_photos" class="form-control mb-2" accept="image/*" capture multiple>
        <small class="text-muted d-block mb-3">
             On mobile: Choose to take a photo or select from gallery<br>
             On desktop: Upload multiple photos (jpg, jpeg, png, webp)
        </small>

        <button class="btn btn-warning">Save Repair</button>
    </form>
</div>

{% endblock %}
